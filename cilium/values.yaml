# ref: https://docs.siderolabs.com/kubernetes-guides/cni/deploying-cilium

# Talos prohibits runtime kernel module loading, so SYS_MODULE must be excluded
securityContext:
  capabilities:
    ciliumAgent:
      - CHOWN
      - KILL
      - NET_ADMIN
      - NET_RAW
      - IPC_LOCK
      - SYS_ADMIN
      - SYS_RESOURCE
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    cleanCiliumState:
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_RESOURCE

cgroup:
  autoMount:
    enabled: false
  hostRoot: /sys/fs/cgroup

# localhost:7445 = KubePrism, Talos's built-in local API proxy
kubeProxyReplacement: "true"
k8sServiceHost: localhost
k8sServicePort: 7445

ipam:
  mode: kubernetes
