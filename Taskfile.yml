version: '3'

# ──────────────────────────────────────────────
# Retrieve the age private key from 1Password
#
# OP_CMD: auto-detect op / op.exe
#   - Uses "op" if a native Linux binary is available
#   - Uses "op.exe" if only the Windows binary exists (WSL2)
#   Note: vars sh: runs in a non-interactive /bin/sh, so shell aliases
#         (e.g. op=op.exe) are not expanded — command -v detects accurately
#
# op run is not available (Windows process cannot spawn Linux binaries)
# → Use op item get --reveal each time and inject via SOPS_AGE_KEY
# ──────────────────────────────────────────────
vars:
  OP_CMD:
    sh: command -v op >/dev/null 2>&1 && echo "op" || echo "op.exe"
  OP_VAULT: Private
  OP_ITEM: talhelper-age-key
  OP_FIELD: private key

# The age key is kept only in shell variable _KEY and immediately unset
# to avoid it appearing in Taskfile verbose output
env:
  TALOSCONFIG: ./clusterconfig/talosconfig

# ──────────────────────────────────────────────
# Default: show task list
# ──────────────────────────────────────────────
tasks:
  default:
    silent: true
    cmds:
      - task --list

  # ────────────────────────────────
  # secrets: SOPS encrypt / decrypt
  # ────────────────────────────────

  secrets:encrypt:
    desc: "Encrypt talsecret.sops.yaml with the age key"
    cmds:
      - |
        _KEY=$({{.OP_CMD}} item get "{{.OP_ITEM}}" --vault "{{.OP_VAULT}}" --fields "{{.OP_FIELD}}" --reveal 2>&1)
        SOPS_AGE_KEY="$_KEY" sops --encrypt --config .sops.yaml --in-place talsecret.sops.yaml
        unset _KEY
        echo "talsecret.sops.yaml encrypted"

  secrets:decrypt:
    desc: "Decrypt talsecret.sops.yaml and print to stdout (for inspection)"
    cmds:
      - |
        _KEY=$({{.OP_CMD}} item get "{{.OP_ITEM}}" --vault "{{.OP_VAULT}}" --fields "{{.OP_FIELD}}" --reveal 2>&1)
        SOPS_AGE_KEY="$_KEY" sops --decrypt talsecret.sops.yaml
        unset _KEY

  secrets:edit:
    desc: "Edit talsecret.sops.yaml in an editor (auto re-encrypts on save)"
    cmds:
      - |
        _KEY=$({{.OP_CMD}} item get "{{.OP_ITEM}}" --vault "{{.OP_VAULT}}" --fields "{{.OP_FIELD}}" --reveal 2>&1)
        SOPS_AGE_KEY="$_KEY" sops edit talsecret.sops.yaml
        unset _KEY

  secrets:generate:
    desc: "Generate new cluster secrets and overwrite talsecret.sops.yaml (initial setup / rebuild)"
    prompt: "This will overwrite talsecret.sops.yaml with new secrets. An existing cluster will need to be rebuilt. Continue?"
    cmds:
      - |
        _KEY=$({{.OP_CMD}} item get "{{.OP_ITEM}}" --vault "{{.OP_VAULT}}" --fields "{{.OP_FIELD}}" --reveal 2>&1)
        _AGE_PUBKEY=$(yq '.creation_rules[0].age' .sops.yaml)
        _PLAIN=$(mktemp /tmp/talsecret_plain_XXXXXX.yaml)
        _ENC=$(mktemp /tmp/talsecret_enc_XXXXXX.yaml)
        talhelper gensecret > "$_PLAIN"
        (cd /tmp && SOPS_AGE_KEY="$_KEY" sops --encrypt --age "$_AGE_PUBKEY" "$(basename "$_PLAIN")") > "$_ENC"
        rm -f "$_PLAIN"
        mv "$_ENC" talsecret.sops.yaml
        unset _KEY _AGE_PUBKEY _PLAIN _ENC
        echo "New secrets generated and talsecret.sops.yaml updated"

  # ────────────────────────────────
  # genconfig: generate node config files
  # ────────────────────────────────

  genconfig:
    desc: "Generate node config files with talhelper genconfig"
    # Skip if inputs are unchanged (fingerprint cache)
    sources:
      - talconfig.yaml
      - talsecret.sops.yaml
      - .sops.yaml
    generates:
      - clusterconfig/*.yaml
    cmds:
      - |
        _KEY=$({{.OP_CMD}} item get "{{.OP_ITEM}}" --vault "{{.OP_VAULT}}" --fields "{{.OP_FIELD}}" --reveal 2>&1)
        SOPS_AGE_KEY="$_KEY" talhelper genconfig
        unset _KEY

  # ────────────────────────────────
  # apply: apply configuration
  # ────────────────────────────────

  apply:
    desc: "Apply configuration to all nodes"
    deps: [genconfig]
    cmds:
      - talhelper gencommand apply | bash

  apply:node:
    desc: "Apply configuration to a specific node (NODE=<hostname>)"
    deps: [genconfig]
    requires:
      vars: [NODE]
    cmds:
      - talhelper gencommand apply --node "{{.NODE}}" | bash

  apply:insecure:
    desc: "Apply configuration with --insecure (use after secrets rotation when the CA has changed)"
    deps: [genconfig]
    cmds:
      - talhelper gencommand apply --extra-flags "--insecure" | bash

  secrets:rotate:
    desc: "Rotate secrets and rebuild the cluster (no physical access required, uses current talosconfig)"
    prompt: "This will regenerate secrets and reboot all nodes. All cluster data will be wiped. Continue?"
    cmds:
      - |
        set -e

        # On failure, print recovery instructions
        _fail() {
          echo ""
          echo "An error occurred."
          echo "The old talosconfig has been saved to /tmp/talosconfig_pre_rotate.yaml."
          echo "Use it to connect to nodes if needed:"
          echo "  talosctl --talosconfig /tmp/talosconfig_pre_rotate.yaml ..."
          exit 1
        }
        trap '_fail' ERR

        # Step 1: Back up current talosconfig (will be overwritten when new secrets are generated)
        cp ./clusterconfig/talosconfig /tmp/talosconfig_pre_rotate.yaml
        echo ">>> Backed up current talosconfig to /tmp/talosconfig_pre_rotate.yaml"

        # Step 2: Regenerate secrets
        # talsecret.sops.yaml is only overwritten after successful encryption
        # to avoid destroying the existing file on failure
        _KEY=$({{.OP_CMD}} item get "{{.OP_ITEM}}" --vault "{{.OP_VAULT}}" --fields "{{.OP_FIELD}}" --reveal 2>&1)
        _AGE_PUBKEY=$(yq '.creation_rules[0].age' .sops.yaml)
        _PLAIN=$(mktemp /tmp/talsecret_plain_XXXXXX.yaml)
        _ENC=$(mktemp /tmp/talsecret_enc_XXXXXX.yaml)
        talhelper gensecret > "$_PLAIN"
        (cd /tmp && SOPS_AGE_KEY="$_KEY" sops --encrypt --age "$_AGE_PUBKEY" "$(basename "$_PLAIN")") > "$_ENC"
        rm -f "$_PLAIN"
        mv "$_ENC" talsecret.sops.yaml
        echo ">>> New secrets generated"

        # Step 3: Regenerate node configs with the new secrets
        SOPS_AGE_KEY="$_KEY" talhelper genconfig
        unset _KEY _AGE_PUBKEY _PLAIN _ENC
        echo ">>> Node configs regenerated"

        # Step 4: Stage new config on all nodes using the old talosconfig
        # --mode=staged: saves config to STATE and applies it on next reboot (handles CA change)
        # Note: staged config is stored in STATE. The EPHEMERAL wipe below does not touch STATE,
        #       so the staged config will be active after reboot.
        echo ">>> Staging new config on all nodes..."
        for _NODE in $(yq '.nodes[].ipAddress' talconfig.yaml); do
          _HOSTNAME=$(yq ".nodes[] | select(.ipAddress == \"$_NODE\") | .hostname" talconfig.yaml)
          talosctl --talosconfig /tmp/talosconfig_pre_rotate.yaml apply-config \
            --mode=staged \
            --nodes "$_NODE" \
            --file "./clusterconfig/yh-cluster-${_HOSTNAME}.yaml"
          echo "    $_NODE ($_HOSTNAME): staged"
        done
        echo ">>> All nodes staged"

        # Step 5: Wipe EPHEMERAL and reboot all nodes using the old talosconfig
        # STATE (with the staged new config) is preserved, so nodes boot with the new config
        # Note: after the CA changes, nodes start with new certs and the old talosconfig
        #       watch loop will keep failing. timeout 120 cuts off after the command is sent.
        _ALL_NODES=$(yq '.nodes[].ipAddress' talconfig.yaml | paste -sd',')
        echo ">>> Rebooting all nodes (EPHEMERAL wipe): $_ALL_NODES"
        timeout 120 talosctl --talosconfig /tmp/talosconfig_pre_rotate.yaml reset \
          --nodes "$_ALL_NODES" \
          --system-labels-to-wipe EPHEMERAL \
          --graceful=false \
          --reboot || {
          _EXIT=$?
          # exit 124 = timeout (expected: watch loop fails after CA change)
          # any other exit code = real error (node unreachable, etc.)
          [ "$_EXIT" -eq 124 ] || { echo "talosctl reset failed (exit: $_EXIT)"; _fail; }
        }
        rm -f /tmp/talosconfig_pre_rotate.yaml
        trap - ERR

        # Step 6: Wait for all nodes to come back using the new talosconfig
        # After the CA change, connect using the new talosconfig (clusterconfig/talosconfig)
        echo ">>> Waiting for nodes to come back (using new talosconfig)..."
        sleep 20
        for _NODE in $(yq '.nodes[].ipAddress' talconfig.yaml); do
          echo -n "    $_NODE: "
          for _I in $(seq 1 36); do
            talosctl version --nodes "$_NODE" >/dev/null 2>&1 && echo "back" && break
            [ "$_I" -eq 36 ] && echo "timed out (3 min)"
            sleep 5
          done
        done

        echo ""
        echo "All nodes are back. Run the following to complete the rebuild:"
        echo "    task bootstrap"
        echo "    task kubeconfig"

  # ────────────────────────────────
  # destroy / rebuild: cluster rebuild
  #
  # Wipes only the EPHEMERAL partition (etcd and kubelet data).
  # The STATE partition (Machineconfig, static IP config) is preserved,
  # so nodes remain reachable at the same IP after reset.
  # Unlike a full talosctl reset, apply is not needed after destroy.
  # ────────────────────────────────

  destroy:
    desc: "Wipe Kubernetes data on all nodes and reboot (Machineconfig and IP config preserved)"
    prompt: "This will wipe the EPHEMERAL partition (etcd and kubelet data) on all nodes. Continue?"
    silent: true
    cmds:
      - |
        ALL_NODES=$(yq '.nodes[].ipAddress' talconfig.yaml | paste -sd',')
        echo ">>> Wiping EPHEMERAL partition on: $ALL_NODES"
        talosctl reset \
          --nodes "$ALL_NODES" \
          --system-labels-to-wipe EPHEMERAL \
          --graceful=false \
          --reboot
        echo ">>> Waiting for nodes to come back..."
        sleep 15
        for NODE in $(yq '.nodes[].ipAddress' talconfig.yaml); do
          echo -n "    $NODE: "
          for i in $(seq 1 24); do
            talosctl version --nodes "$NODE" >/dev/null 2>&1 && echo "back" && break
            [ "$i" = "24" ] && echo "timed out"
            sleep 5
          done
        done

  rebuild:
    desc: "Rebuild the cluster (destroy -> bootstrap -> kubeconfig). If secrets were rotated, run apply:insecure first."
    prompt: "This will rebuild the cluster. All Kubernetes data on all nodes will be wiped. Continue?"
    cmds:
      - task: destroy
      - task: bootstrap
      - task: kubeconfig

  # ────────────────────────────────
  # bootstrap: initial cluster startup
  # ────────────────────────────────

  bootstrap:
    desc: "Bootstrap the cluster (first time only, runs on c1 node)"
    prompt: "Bootstrap is only valid on the first run. Running on an existing cluster will corrupt etcd. Continue?"
    cmds:
      - talhelper gencommand bootstrap | bash

  # ────────────────────────────────
  # kubeconfig: fetch cluster access config
  # ────────────────────────────────

  kubeconfig:
    desc: "Fetch kubeconfig and merge into ~/.kube/config"
    cmds:
      - talhelper gencommand kubeconfig | bash

  # ────────────────────────────────
  # upgrade: version upgrades
  # ────────────────────────────────

  upgrade:talos:
    desc: "Upgrade Talos on all nodes (uses talosVersion from talconfig.yaml)"
    prompt: "This will upgrade Talos. Check talosVersion in talconfig.yaml before proceeding. Continue?"
    cmds:
      # Regenerate config after version change before upgrading
      - |
        _KEY=$({{.OP_CMD}} item get "{{.OP_ITEM}}" --vault "{{.OP_VAULT}}" --fields "{{.OP_FIELD}}" --reveal 2>&1)
        SOPS_AGE_KEY="$_KEY" talhelper genconfig
        unset _KEY
      - talhelper gencommand upgrade | bash

  upgrade:talos:node:
    desc: "Upgrade Talos on a specific node (NODE=<hostname>)"
    requires:
      vars: [NODE]
    cmds:
      - |
        _KEY=$({{.OP_CMD}} item get "{{.OP_ITEM}}" --vault "{{.OP_VAULT}}" --fields "{{.OP_FIELD}}" --reveal 2>&1)
        SOPS_AGE_KEY="$_KEY" talhelper genconfig
        unset _KEY
      - talhelper gencommand upgrade --node "{{.NODE}}" | bash

  upgrade:k8s:
    desc: "Upgrade Kubernetes (uses kubernetesVersion from talconfig.yaml)"
    prompt: "This will upgrade Kubernetes. Check kubernetesVersion in talconfig.yaml before proceeding. Continue?"
    cmds:
      - talhelper gencommand upgrade-k8s | bash

  # ────────────────────────────────
  # health: cluster / node status checks
  # ────────────────────────────────

  health:
    desc: "Run a full cluster health check (talosctl health)"
    cmds:
      - |
        CP_NODES=$(yq '.nodes[] | select(.controlPlane == true) | .ipAddress' talconfig.yaml | paste -sd',')
        WORKER_NODES=$(yq '.nodes[] | select(.controlPlane == false) | .ipAddress' talconfig.yaml | paste -sd',')
        FIRST_CP=$(yq '.nodes[] | select(.controlPlane == true) | .ipAddress' talconfig.yaml | head -1)
        talosctl health \
          --nodes "$FIRST_CP" \
          --control-plane-nodes "$CP_NODES" \
          --worker-nodes "$WORKER_NODES"

  health:nodes:
    desc: "Show Talos machine status for all nodes"
    cmds:
      - |
        ALL_NODES=$(yq '.nodes[].ipAddress' talconfig.yaml | paste -sd',')
        talosctl get machinestatus --nodes "$ALL_NODES"

  # ────────────────────────────────
  # reboot: safe node reboot
  #
  # Unlike talosctl reset, preserves config and reboots the OS only.
  # workers / controlplanes reboot one at a time, waiting for each
  # node to come back before proceeding to the next.
  # ────────────────────────────────

  reboot:node:
    desc: "Safely reboot a specific node (NODE=<IP or hostname>)"
    requires:
      vars: [NODE]
    cmds:
      - |
        _wait_reboot() {
          local node="$1" i
          sleep 10
          for i in $(seq 1 24); do
            talosctl version --nodes "$node" >/dev/null 2>&1 && echo "    $node back" && return 0
            sleep 5
          done
          echo "    $node timed out (no response after ~2 min)"
        }
        echo ">>> Rebooting {{.NODE}}..."
        talosctl reboot --nodes "{{.NODE}}"
        _wait_reboot "{{.NODE}}"

  reboot:workers:
    desc: "Reboot worker nodes one at a time"
    silent: true
    cmds:
      - |
        _wait_reboot() {
          local node="$1" i
          sleep 10
          for i in $(seq 1 24); do
            talosctl version --nodes "$node" >/dev/null 2>&1 && echo "    $node back" && return 0
            sleep 5
          done
          echo "    $node timed out (no response after ~2 min)"
        }
        WORKERS=$(yq '.nodes[] | select(.controlPlane == false) | .ipAddress' talconfig.yaml)
        for NODE in $WORKERS; do
          echo ">>> Rebooting $NODE..."
          talosctl reboot --nodes "$NODE"
          _wait_reboot "$NODE"
        done

  reboot:controlplanes:
    desc: "Reboot control plane nodes one at a time (maintains etcd quorum)"
    prompt: "Reboot CP nodes one at a time, waiting for each to recover before proceeding. Continue?"
    silent: true
    cmds:
      - |
        _wait_reboot() {
          local node="$1" i
          sleep 10
          for i in $(seq 1 24); do
            talosctl version --nodes "$node" >/dev/null 2>&1 && echo "    $node back" && return 0
            sleep 5
          done
          echo "    $node timed out (no response after ~2 min)"
        }
        CPS=$(yq '.nodes[] | select(.controlPlane == true) | .ipAddress' talconfig.yaml)
        for NODE in $CPS; do
          echo ">>> Rebooting $NODE..."
          talosctl reboot --nodes "$NODE"
          _wait_reboot "$NODE"
        done
