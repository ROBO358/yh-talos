clusterName: yh-cluster
endpoint: https://192.168.1.200:6443
talosVersion: v1.12.6
kubernetesVersion: v1.35.2

cniConfig:
  name: none

patches:
  - |-
    cluster:
      proxy:
        disabled: true

# ref: https://docs.siderolabs.com/kubernetes-guides/cni/deploying-cilium
# skipEnvsubst: true preserves ${BIN_PATH} in Cilium init container commands
# Top-level placement required: talhelper v3 silently ignores controlPlane.inlineManifests.
# Workers receive this manifest but Talos ignores inlineManifests on non-bootstrap nodes.
inlineManifests:
  - name: cilium
    contents: "@./cilium/bootstrap.yaml"
    skipEnvsubst: true

nodes:
  - hostname: c1-k8s-yh
    ipAddress: 192.168.1.201
    controlPlane: true
    installDisk: /dev/nvme0n1
    machineSpec:
      mode: metal
      arch: amd64
      secureboot: true
      useUKI: true
    networkInterfaces:
      - interface: enp1s0
        addresses:
          - 192.168.1.201/24
        routes:
          - network: 0.0.0.0/0
            gateway: 192.168.1.1
        vip:
          ip: 192.168.1.200
  - hostname: c2-k8s-yh
    ipAddress: 192.168.1.202
    controlPlane: true
    installDisk: /dev/nvme0n1
    machineSpec:
      mode: metal
      arch: amd64
      secureboot: true
      useUKI: true
    networkInterfaces:
      - interface: enp1s0
        addresses:
          - 192.168.1.202/24
        routes:
          - network: 0.0.0.0/0
            gateway: 192.168.1.1
        vip:
          ip: 192.168.1.200
  - hostname: c3-k8s-yh
    ipAddress: 192.168.1.203
    controlPlane: true
    installDisk: /dev/nvme0n1
    machineSpec:
      mode: metal
      arch: amd64
      secureboot: true
      useUKI: true
    networkInterfaces:
      - interface: enp1s0
        addresses:
          - 192.168.1.203/24
        routes:
          - network: 0.0.0.0/0
            gateway: 192.168.1.1
        vip:
          ip: 192.168.1.200

  - hostname: w1-k8s-yh
    ipAddress: 192.168.1.211
    controlPlane: false
    installDisk: /dev/nvme0n1
    machineSpec:
      mode: metal
      arch: amd64
      secureboot: true
      useUKI: true
    networkInterfaces:
      - interface: enp1s0
        addresses:
          - 192.168.1.211/24
        routes:
          - network: 0.0.0.0/0
            gateway: 192.168.1.1
  - hostname: w2-k8s-yh
    ipAddress: 192.168.1.212
    controlPlane: false
    installDisk: /dev/nvme0n1
    machineSpec:
      mode: metal
      arch: amd64
      secureboot: true
      useUKI: true
    networkInterfaces:
      - interface: enp1s0
        addresses:
          - 192.168.1.212/24
        routes:
          - network: 0.0.0.0/0
            gateway: 192.168.1.1
  - hostname: w3-k8s-yh
    ipAddress: 192.168.1.213
    controlPlane: false
    installDisk: /dev/nvme0n1
    machineSpec:
      mode: metal
      arch: amd64
      secureboot: true
      useUKI: true
    networkInterfaces:
      - interface: enp1s0
        addresses:
          - 192.168.1.213/24
        routes:
          - network: 0.0.0.0/0
            gateway: 192.168.1.1
